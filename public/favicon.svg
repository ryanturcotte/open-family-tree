<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Flip the tree icon vertically around the center -->
  <g transform="translate(0,100) scale(1,-1)">
    <!-- Top node (now bottom child) -->
    <rect x="37" y="16" width="26" height="20" rx="4" fill="white"/>
    <!-- Vertical stem -->
    <line x1="50" y1="36" x2="50" y2="48" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Horizontal crossbar -->
    <line x1="26" y1="48" x2="74" y2="48" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Left drop -->
    <line x1="26" y1="48" x2="26" y2="58" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Right drop -->
    <line x1="74" y1="48" x2="74" y2="58" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Bottom-left node (now top-left parent) -->
    <rect x="13" y="58" width="26" height="20" rx="4" fill="white"/>
    <!-- Bottom-right node (now top-right parent) -->
    <rect x="61" y="58" width="26" height="20" rx="4" fill="white"/>
  </g>
</svg>